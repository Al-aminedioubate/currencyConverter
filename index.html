<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Currency Converter</title>
</head>
<body>
    <div class="container">
        <h1>Currency Converter</h1>
        <div class="container1">
            <div class="currencyOne">
                 <select name="currency" id="currency-selecter1">
                    <option value="USD">USD</option>
                    <option value="CAD">CAD</option>
                    <option value="EUR">EUR</option>
                    <option value="gbp">GBP</option>
                    <option value="INR">INR</option>
                    <option value="JPY">JPY</option>
                </select>
            </div>
            <input id="currency-input" type="number">
        </div>
        <div class="container2">
            <div class="currencyTwo">
                <select name="currency" id="currency-selecter2">
                    <option value="usd">USD</option>
                    <option value="cad">CAD</option>
                    <option value="eur">EUR</option>
                    <option value="gbp">GBP</option>
                    <option value="INR">INR</option>
                    <option value="JPY">JPY</option>
                </select>
            </div>
           <p id="currency-show">Test</p>
        </div>
       <p id="currency-converted-result">1 USD = 1.3707 CAD</p>
    </div>
    <script src="index.js"></script>
</body>
</html>
